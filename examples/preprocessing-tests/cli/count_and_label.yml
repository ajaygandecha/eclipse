program: count_and_label
entry_point: main

args:
  argv0: "count-and-label"
  elements:
    - id: count_flag
      type: option
      optional: true
      spellings: ["-n", "--count"]

    - id: count_value
      type: option_value
      parent: count_flag
      optional: false
      value_kind: int
      min: 1
      max: 12

    - id: label
      type: positional
      optional: true
      min_length: 1
      max_length: 5
