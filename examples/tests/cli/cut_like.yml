program: cut
options:
  mode:
    kind: one_of
    required: true
    choices:
      bytes:
        flag: --bytes
        type: string
        max_length: 8
      characters:
        flag: --characters
        type: string
        max_length: 8
      fields:
        flag: --fields
        type: string
        max_length: 8
  delimiter:
    flag: --delimiter
    type: string
    max_length: 1
    requires:
      - option: mode
        choice: fields
    excludes:
      - whitespace_delimited
  whitespace_delimited:
    flag: --whitespace-delimited
    type: enum_flag
    values:
      - present
      - trimmed
    requires:
      - option: mode
        choice: fields
    excludes:
      - delimiter
  only_delimited:
    flag: --only-delimited
    type: bool
    requires:
      - option: mode
        choice: fields
  no_partial:
    flag: --no-partial
    type: bool
    requires:
      - option: mode
        choice: bytes
  output_delimiter:
    flag: --output-delimiter
    type: string
    max_length: 8
  complement:
    flag: --complement
    type: bool
  zero_terminated:
    flag: --zero-terminated
    type: bool
positionals:
  files:
    type: string_list
    min_count: 0
    max_count: 2
    max_length: 12
