program: alarm-keypad
entry_point: main

klee_posix_command: "--sym-arg 5 --sym-arg 5"

args:
  argv0: "alarm-keypad"
  elements:
    - id: max_polls
      type: positional
      value_kind: int
      optional: false
      min: 1
      max: 99999

    - id: digit
      type: positional
      value_kind: int
      optional: false
      min: 1
      max: 99999