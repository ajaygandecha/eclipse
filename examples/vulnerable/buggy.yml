program: buggy
entry_point: main

klee_posix_command: "--sym-arg 2 --sym-arg 5"

args:
  argv0: "buggy"
  elements: 
    - id: mode
      type: option
      optional: false
      spellings: ["-c", "-l", "-f"]

    - id: word
      type: positional
      optional: false
      min_length: 1
      max_length: 5