program: irrigation-controller
entry_point: main

klee_posix_command: "--sym-args 2 2 2"

args:
  argv0: "irrigation-controller"
  elements:
    - id: cycles
      type: positional
      optional: false
      value_kind: int
      min: 1
      max: 99

    - id: zone
      type: positional
      optional: false
      min_length: 1
      max_length: 2
