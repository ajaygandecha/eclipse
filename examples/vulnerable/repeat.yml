program: repeat
entry_point: main

#klee_posix_command: "--sym-args 2 2 5"
klee_posix_command: " --sym-arg 5 --sym-arg 5"

args:
  argv0: "repeat"
  elements:
    - id: word
      type: positional
      optional: false
      min_length: 1
      max_length: 5

    - id: count
      type: positional
      value_kind: int
      optional: false
      min: 1
      max: 99999
